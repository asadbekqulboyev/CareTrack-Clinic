# Render.com Blueprint - one-click deploy for the backend
services:
  - type: web
    name: caretrack-mrms-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false        # set manually to your Netlify URL e.g. https://caretrack.netlify.app
      - key: DATABASE_URL
        sync: false        # set manually to your MySQL connection string
      - key: DB_SSL
        value: "true"
