<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahifa topilmadi — CareTrack Clinic</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .err-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px; background: var(--bg); }
    .err-card { text-align: center; max-width: 520px; }
    .err-num {
      font-size: 140px; font-weight: 900; line-height: 1;
      background: var(--grad-primary);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      letter-spacing: -.04em;
    }
    .err-card h1 { font-size: 28px; margin: 12px 0 8px; }
    .err-card p { color: var(--text-mute); margin-bottom: 24px; }
    .err-actions { display: inline-flex; gap: 10px; }
  </style>
</head>
<body>
  <div class="err-shell">
    <div class="err-card">
      <div class="err-num">404</div>
      <h1>Sahifa topilmadi</h1>
      <p>Siz qidirayotgan sahifa mavjud emas, ko'chirilgan yoki o'chirilgan bo'lishi mumkin.</p>
      <div class="err-actions">
        <a href="dashboard.html" class="btn btn-primary btn-lg">Bosh sahifaga qaytish</a>
        <a href="javascript:history.back()" class="btn btn-ghost btn-lg">← Orqaga</a>
      </div>
    </div>
  </div>
</body>
</html>
